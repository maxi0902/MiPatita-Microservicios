server:
  port: 8082

spring:
  application:
    name: ms-usuarios
  datasource:
    driver-class-name: org.sqlite.JDBC
    url: jdbc:sqlite:usuarios.db
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
  flyway:
    enabled: true

# Configuracion JWT (secreto externalizado, minimo 32 caracteres para HS256)
jwt:
  secret: BienHechoMiPatitaClaveSecretaSuperSegura2026ParaFirmarJWT
  expiration-ms: 3600000

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
