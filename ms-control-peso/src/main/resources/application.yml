server:
  port: 8085

spring:
  application:
    name: ms-control-peso
  datasource:
    driver-class-name: org.sqlite.JDBC
    url: jdbc:sqlite:control_peso.db
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
  flyway:
    enabled: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
