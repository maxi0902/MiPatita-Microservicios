spring.application.name=mipatita
server.port=8080

#conexion a sqlite
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.url=jdbc:sqlite:mipatita.db

#Hibernate NO crea ni modifica tablas: de eso se encarga Flyway (migraciones versionadas)
spring.jpa.hibernate.ddl-auto=none

#Flyway ejecuta las migraciones al iniciar
spring.flyway.enabled=true

#muestra las consultas SQL en consola (depuracion)
spring.jpa.show-sql=true

#configuracion JWT (secreto externalizado: minimo 32 caracteres para HS256)
jwt.secret=BienHechoMiPatitaClaveSecretaSuperSegura2026ParaFirmarJWT
jwt.expiration-ms=3600000

#URL del microservicio de Mascotas que consume el Feign Client (externalizada, no hardcodeada)
mascotas.service.url=http://localhost:8081/api/v1/mascotas
