server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            # Cada ruta redirige a un microservicio descubierto por Eureka (lb:// = load balanced)
            - id: ms-usuarios
              uri: lb://ms-usuarios
              predicates:
                - Path=/api/v1/auth/**

            - id: ms-mascotas
              uri: lb://ms-mascotas
              predicates:
                - Path=/api/v1/mascotas/**,/api/v2/mascotas/**

            - id: ms-actividades
              uri: lb://ms-actividades
              predicates:
                - Path=/api/v1/actividades/**

            - id: ms-comidas
              uri: lb://ms-comidas
              predicates:
                - Path=/api/v1/comidas/**

            - id: ms-control-peso
              uri: lb://ms-control-peso
              predicates:
                - Path=/api/v1/controles-peso/**

            - id: ms-recordatorios
              uri: lb://ms-recordatorios
              predicates:
                - Path=/api/v1/recordatorios/**

            - id: ms-vacunas
              uri: lb://ms-vacunas
              predicates:
                - Path=/api/v1/vacunas/**

            - id: ms-notificaciones
              uri: lb://ms-notificaciones
              predicates:
                - Path=/api/v1/notificaciones/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
